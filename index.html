<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>CraftTrend Radar | 手工趋势雷达</title>
  <style>
    :root{
      --bg:#f6f8ff;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e5e7eb;
      --brand:#ff2d83;
      --brand2:#5b7cff;
      --ok:#16a34a;
      --warn:#f59e0b;
      --shadow:0 12px 40px rgba(15,23,42,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"PingFang SC","Microsoft Yahei",sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 500px at 10% 10%, rgba(255,45,131,.18), transparent 60%),
        radial-gradient(900px 500px at 90% 15%, rgba(91,124,255,.18), transparent 60%),
        var(--bg);
    }
    header{max-width:1200px;margin:0 auto;padding:22px 18px 10px;display:flex;gap:14px;align-items:flex-start;justify-content:space-between;flex-wrap:wrap}
    h1{margin:0;font-size:20px;letter-spacing:.2px}
    .sub{color:var(--muted);font-size:12px;line-height:1.5;margin-top:6px}
    .topRight{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .pill{
      padding:8px 10px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.75);
      box-shadow:0 8px 24px rgba(15,23,42,.06); font-size:12px; color:var(--muted)
    }
    main{max-width:1200px;margin:0 auto;padding:10px 18px 40px;display:grid;grid-template-columns:360px 1fr;gap:14px}
    @media (max-width:980px){main{grid-template-columns:1fr}}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
    .card h2{margin:0 0 10px;font-size:13px;color:#111827}
    label{display:block;margin:10px 0 6px;font-size:12px;color:var(--muted)}
    input,select,textarea{
      width:100%;padding:10px 11px;border-radius:14px;border:1px solid var(--line);
      background:#fff;color:var(--text);outline:none
    }
    textarea{min-height:72px;resize:vertical}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    button{
      border:1px solid var(--line);background:#fff;color:var(--text);padding:10px 12px;border-radius:14px;cursor:pointer;
      box-shadow:0 8px 22px rgba(15,23,42,.06)
    }
    button:hover{transform:translateY(-1px)}
    .primary{background:linear-gradient(90deg,var(--brand),var(--brand2));color:white;border-color:transparent}
    .ghost{background:transparent;box-shadow:none}
    .tabs{display:flex;gap:8px;flex-wrap:wrap}
    .tab{padding:8px 10px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--muted);font-size:12px;cursor:pointer}
    .tab.active{background:rgba(255,45,131,.10);border-color:rgba(255,45,131,.30);color:#111827}
    .chips{display:flex;gap:8px;flex-wrap:wrap}
    .chip{padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:12px;color:var(--muted);cursor:pointer}
    .chip.on{background:rgba(91,124,255,.10);border-color:rgba(91,124,255,.35);color:#111827}
    .feed{display:grid;gap:10px;margin-top:10px}
    .item{border:1px solid var(--line);border-radius:16px;padding:12px;background:linear-gradient(180deg,#fff, #fbfcff)}
    .itemTop{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    .title{font-weight:700;font-size:14px;line-height:1.35}
    .meta{font-size:12px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    a{color:inherit}
    .badge{font-size:11px;padding:4px 8px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--muted)}
    .badge.cn{border-color:rgba(255,45,131,.25);background:rgba(255,45,131,.06);color:#9f1239}
    .badge.gl{border-color:rgba(91,124,255,.25);background:rgba(91,124,255,.06);color:#1d4ed8}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .small{font-size:12px}
    .muted{color:var(--muted)}
    .hr{height:1px;background:var(--line);margin:12px 0}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;white-space:pre-wrap;word-break:break-word;border:1px solid var(--line);border-radius:16px;padding:10px;background:#fff}
  </style>
</head>
<body>
<header>
  <div>
    <h1>CraftTrend Radar | 手工趋势雷达</h1>
    <div class="sub">趋势聚合（国内/海外）→ 搜索/过滤 → 收藏 → 导出 → 一键生成小红书选题。数据由 GitHub Actions 定时更新 trends.json。</div>
  </div>
  <div class="topRight">
    <div class="pill" id="status">加载中…</div>
    <div class="pill" id="lastUpdate">Last update: -</div>
  </div>
</header>

<main>
  <section class="card">
    <h2>趋势检索</h2>

    <label>关键词（支持中英）</label>
    <input id="q" placeholder="例：串珠 / 钩织 / 拼豆 / tufting / crochet / DIY resin"/>

    <div class="row">
      <div>
        <label>地区</label>
        <select id="region">
          <option value="all">全部</option>
          <option value="cn">国内</option>
          <option value="global">海外</option>
        </select>
      </div>
      <div>
        <label>时间范围</label>
        <select id="range">
          <option value="7">近7天</option>
          <option value="30">近30天</option>
          <option value="180">近半年</option>
          <option value="9999">全部</option>
        </select>
      </div>
    </div>

    <label>标签过滤（可多选）</label>
    <div class="chips" id="tagChips"></div>

    <div class="btns">
      <button class="primary" id="searchBtn">搜索趋势</button>
      <button id="resetBtn">重置</button>
      <button class="ghost" id="openFav">打开收藏夹</button>
    </div>

    <div class="hr"></div>

    <h2>小红书选题生成</h2>
    <label>选择一个趋势后，会自动生成选题（标题/结构/标签）</label>
    <textarea id="ideaBox" placeholder="点击右侧任意趋势条目 → 这里会生成小红书选题模板" readonly></textarea>
    <div class="btns">
      <button id="copyIdea">复制选题</button>
    </div>

    <div class="hr"></div>

    <h2>导出</h2>
    <div class="btns">
      <button id="exportJSON">导出 JSON</button>
      <button id="exportCSV">导出 CSV</button>
      <button class="ghost" id="dailyBrief">生成今日简报</button>
    </div>
    <div class="mono" id="briefBox" style="display:none;margin-top:10px"></div>

  </section>

  <section class="card">
    <div class="tabs" id="tabs">
      <div class="tab active" data-tab="feed">趋势流</div>
      <div class="tab" data-tab="fav">收藏夹</div>
    </div>

    <div id="feedView">
      <div class="muted small">提示：点击任意趋势条目可生成小红书选题；点 ⭐ 收藏。</div>
      <div class="feed" id="feed"></div>
    </div>

    <div id="favView" style="display:none">
      <div class="muted small">收藏会保存在你的浏览器（localStorage）。</div>
      <div class="feed" id="favFeed"></div>
      <div class="btns" style="margin-top:12px">
        <button id="clearFav">清空收藏</button>
      </div>
    </div>
  </section>
</main>

<script src="./app.js"></script>
</body>
</html>
